<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1on1 練習アプリ | AIで部下との対話を磨く</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    #vercel-live-feedback, vercel-live-feedback { display: none !important; }

    :root {
      --primary: #4F46E5;
      --primary-light: #EEF2FF;
      --primary-dark: #3730A3;
      --success: #10B981;
      --warning: #F59E0B;
      --danger: #EF4444;
      --gray-50: #F9FAFB;
      --gray-100: #F3F4F6;
      --gray-200: #E5E7EB;
      --gray-400: #9CA3AF;
      --gray-600: #4B5563;
      --gray-800: #1F2937;
      --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
    }

    body {
      font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .app-container {
      width: 100%;
      max-width: 860px;
    }

    /* === SCREENS === */
    .screen { display: none; }
    .screen.active { display: block; }

    /* === TOP SCREEN === */
    .top-card {
      background: white;
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow: var(--shadow-lg);
      text-align: center;
    }

    .app-badge {
      display: inline-block;
      background: var(--primary-light);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: 20px;
      letter-spacing: 0.05em;
      margin-bottom: 20px;
    }

    .app-title {
      font-size: 32px;
      font-weight: 800;
      color: var(--gray-800);
      margin-bottom: 12px;
      line-height: 1.2;
    }

    .app-subtitle {
      font-size: 16px;
      color: var(--gray-600);
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .scenario-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .scenario-card {
      background: var(--gray-50);
      border: 2px solid var(--gray-200);
      border-radius: 16px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
    }

    .scenario-card:hover {
      border-color: var(--primary);
      background: var(--primary-light);
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .scenario-card.selected {
      border-color: var(--primary);
      background: var(--primary-light);
    }

    .scenario-icon {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .scenario-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--gray-800);
      margin-bottom: 4px;
    }

    .scenario-desc {
      font-size: 12px;
      color: var(--gray-600);
      line-height: 1.5;
    }

    .start-btn {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 16px 48px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 15px rgba(79,70,229,0.4);
    }

    .start-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(79,70,229,0.5);
    }

    .start-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* === CHAT SCREEN === */
    .chat-wrapper {
      background: white;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      display: flex;
      flex-direction: column;
      height: 90vh;
      max-height: 760px;
    }

    .chat-header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .chat-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .persona-avatar {
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .persona-info .name {
      font-size: 15px;
      font-weight: 700;
      color: white;
    }

    .persona-info .role {
      font-size: 12px;
      color: rgba(255,255,255,0.75);
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .header-btn {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .header-btn:hover { background: rgba(255,255,255,0.3); }

    .turn-counter {
      background: rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 4px 12px;
      font-size: 12px;
      color: rgba(255,255,255,0.9);
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: var(--gray-50);
    }

    .message {
      display: flex;
      gap: 10px;
      max-width: 78%;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { align-self: flex-end; flex-direction: row-reverse; }

    .msg-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .message.assistant .msg-avatar { background: var(--primary-light); }
    .message.user .msg-avatar { background: #DCFCE7; }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.6;
    }

    .message.assistant .msg-bubble {
      background: white;
      color: var(--gray-800);
      border-bottom-left-radius: 4px;
      box-shadow: var(--shadow);
    }

    .message.user .msg-bubble {
      background: var(--primary);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .typing-indicator {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .typing-dots {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      background: white;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      box-shadow: var(--shadow);
    }

    .typing-dots span {
      width: 8px;
      height: 8px;
      background: var(--gray-400);
      border-radius: 50%;
      animation: bounce 1.4s infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .chat-input-area {
      padding: 16px 20px;
      background: white;
      border-top: 1px solid var(--gray-200);
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .chat-textarea {
      flex: 1;
      border: 2px solid var(--gray-200);
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.5;
      max-height: 100px;
      min-height: 44px;
    }

    .chat-textarea:focus { border-color: var(--primary); }

    .send-btn {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      width: 48px;
      height: 48px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .send-btn:hover:not(:disabled) { background: var(--primary-dark); transform: scale(1.05); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .input-hint {
      font-size: 11px;
      color: var(--gray-400);
      margin-top: 6px;
      text-align: center;
    }

    /* === FEEDBACK SCREEN === */
    .feedback-wrapper {
      background: white;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      max-height: 90vh;
      overflow-y: auto;
    }

    .feedback-header {
      background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
      padding: 28px 32px;
      text-align: center;
    }

    .feedback-header h2 {
      font-size: 22px;
      font-weight: 800;
      color: white;
      margin-bottom: 6px;
    }

    .feedback-header p {
      font-size: 14px;
      color: rgba(255,255,255,0.85);
    }

    .feedback-body {
      padding: 32px;
    }

    .feedback-loading {
      text-align: center;
      padding: 48px;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid var(--gray-200);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .feedback-content {
      white-space: pre-wrap;
      line-height: 1.8;
      color: var(--gray-800);
      font-size: 14px;
    }

    .feedback-content h1, .feedback-content h2, .feedback-content h3 {
      font-size: 15px;
      font-weight: 700;
      color: var(--gray-800);
      margin: 20px 0 8px;
    }

    .feedback-actions {
      display: flex;
      gap: 12px;
      padding: 24px 32px;
      border-top: 1px solid var(--gray-200);
    }

    .action-btn {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }

    .action-btn.primary {
      background: var(--primary);
      color: white;
    }

    .action-btn.secondary {
      background: var(--gray-100);
      color: var(--gray-800);
    }

    .action-btn:hover { opacity: 0.85; transform: translateY(-1px); }

    /* System message */
    .system-msg {
      text-align: center;
      font-size: 12px;
      color: var(--gray-400);
      padding: 4px 0;
    }

    .scenario-tag {
      display: inline-block;
      background: var(--primary-light);
      color: var(--primary);
      font-size: 11px;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<!-- === TOP SCREEN === -->
<div class="app-container">
  <div id="screen-top" class="screen active">
    <div class="top-card">
      <div class="app-badge">AI 1on1 トレーニング</div>
      <h1 class="app-title">1on1 練習アプリ</h1>
      <p class="app-subtitle">
        AIが本物の部下を演じます。リアルなシナリオで<br>
        1on1スキルを鍛え、フィードバックで成長しましょう。
      </p>

      <div class="scenario-grid" id="scenarioGrid"></div>

      <button class="start-btn" id="startBtn" disabled onclick="startSession()">
        練習を開始する →
      </button>
    </div>
  </div>

  <!-- === CHAT SCREEN === -->
  <div id="screen-chat" class="screen">
    <div class="chat-wrapper">
      <div class="chat-header">
        <div class="chat-header-left">
          <div class="persona-avatar" id="personaAvatar">👤</div>
          <div class="persona-info">
            <div class="name" id="personaName">部下</div>
            <div class="role" id="personaRole">シナリオ読み込み中...</div>
          </div>
        </div>
        <div class="header-actions">
          <div class="turn-counter" id="turnCounter">0 ターン</div>
          <button class="header-btn" onclick="endSession()">セッション終了</button>
        </div>
      </div>

      <div class="chat-messages" id="chatMessages"></div>

      <div class="chat-input-area">
        <div class="input-row">
          <textarea
            class="chat-textarea"
            id="userInput"
            placeholder="部下に話しかけてみてください..."
            rows="1"
            onkeydown="handleKeydown(event)"
            oninput="autoResize(this)"
          ></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
        </div>
        <div class="input-hint">Enter で送信 / Shift+Enter で改行</div>
      </div>
    </div>
  </div>

  <!-- === FEEDBACK SCREEN === -->
  <div id="screen-feedback" class="screen">
    <div class="feedback-wrapper">
      <div class="feedback-header">
        <h2>🎯 セッション完了！フィードバック</h2>
        <p id="feedbackScenarioLabel">シナリオ: —</p>
      </div>
      <div class="feedback-body">
        <div class="feedback-loading" id="feedbackLoading">
          <div class="spinner"></div>
          <p style="color: var(--gray-600); font-size: 14px;">AIがフィードバックを生成中...</p>
        </div>
        <div class="feedback-content" id="feedbackContent" style="display:none;"></div>
      </div>
      <div class="feedback-actions">
        <button class="action-btn secondary" onclick="showScreen('top')">シナリオ選択に戻る</button>
        <button class="action-btn primary" onclick="replayScenario()">同じシナリオで再挑戦</button>
      </div>
    </div>
  </div>
</div>

<script>
const SCENARIOS = {
  burnout: {
    name: "燃え尽き・モチベーション低下",
    persona: "田中さん（28歳）",
    avatar: "😔",
    desc: "残業続きで疲弊。やる気が見えない部下との対話",
    icon: "🔥"
  },
  conflict: {
    name: "チーム内人間関係の悩み",
    persona: "佐藤さん（32歳）",
    avatar: "😟",
    desc: "同僚との関係が悪化。チームの雰囲気も低下",
    icon: "🤝"
  },
  career: {
    name: "キャリアの方向性・成長の悩み",
    persona: "鈴木さん（25歳）",
    avatar: "🤔",
    desc: "転職・異動を検討中。将来に迷いがある若手",
    icon: "🚀"
  },
  performance: {
    name: "業務パフォーマンスの課題",
    persona: "高橋さん（35歳）",
    avatar: "😰",
    desc: "最近ミスが増加。自信を失いかけているベテラン",
    icon: "📊"
  },
  worklife: {
    name: "仕事と私生活のバランス",
    persona: "中村さん（30歳）",
    avatar: "😓",
    desc: "育児と仕事の両立に限界。疲弊している部下",
    icon: "⚖️"
  }
};

const OPENING_MESSAGES = {
  burnout: "あ、部長、お時間いただいてありがとうございます。えっと...特に何も問題はないんですが、1on1ということで...",
  conflict: "はい、呼んでいただいてありがとうございます。えーと...何でしょうか？",
  career: "あ、はい。お時間ありがとうございます。実は、少し相談したいことがあって...",
  performance: "失礼します。呼んでいただきましたが...何かありましたでしょうか？",
  worklife: "お時間いただいてありがとうございます。最近はまあ、なんとかやっています。"
};

let currentScenario = null;
let messages = [];
let turnCount = 0;
let isLoading = false;

// Build scenario grid
function buildScenarioGrid() {
  const grid = document.getElementById('scenarioGrid');
  grid.innerHTML = Object.entries(SCENARIOS).map(([key, s]) => `
    <div class="scenario-card" id="card-${key}" onclick="selectScenario('${key}')">
      <div class="scenario-icon">${s.icon}</div>
      <div class="scenario-title">${s.name}</div>
      <div class="scenario-desc">${s.desc}</div>
    </div>
  `).join('');
}

function selectScenario(key) {
  document.querySelectorAll('.scenario-card').forEach(c => c.classList.remove('selected'));
  document.getElementById(`card-${key}`).classList.add('selected');
  currentScenario = key;
  document.getElementById('startBtn').disabled = false;
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`screen-${name}`).classList.add('active');
  window.scrollTo(0, 0);
}

function startSession() {
  if (!currentScenario) return;
  const s = SCENARIOS[currentScenario];

  // Reset state
  messages = [];
  turnCount = 0;

  // Setup header
  document.getElementById('personaAvatar').textContent = s.avatar;
  document.getElementById('personaName').textContent = s.persona;
  document.getElementById('personaRole').textContent = s.name;
  document.getElementById('turnCounter').textContent = '0 ターン';

  // Clear chat
  const chatEl = document.getElementById('chatMessages');
  chatEl.innerHTML = `
    <div class="system-msg">
      <span class="scenario-tag">📋 ${s.name}</span><br>
      <span style="font-size:11px; margin-top:4px; display:block;">1on1がはじまりました。部下に話しかけてみましょう。</span>
    </div>
  `;

  showScreen('chat');

  // Opening message from AI
  setTimeout(() => addMessage('assistant', OPENING_MESSAGES[currentScenario]), 600);
}

function addMessage(role, content) {
  const s = SCENARIOS[currentScenario];
  const chatEl = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.innerHTML = `
    <div class="msg-avatar">${role === 'assistant' ? s.avatar : '👔'}</div>
    <div class="msg-bubble">${escapeHtml(content)}</div>
  `;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;

  messages.push({ role, content });
  if (role === 'user') {
    turnCount++;
    document.getElementById('turnCounter').textContent = `${turnCount} ターン`;
  }
}

function showTyping() {
  const chatEl = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'typing-indicator';
  div.id = 'typingIndicator';
  const s = SCENARIOS[currentScenario];
  div.innerHTML = `
    <div class="msg-avatar">${s.avatar}</div>
    <div class="typing-dots"><span></span><span></span><span></span></div>
  `;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isLoading) return;

  input.value = '';
  input.style.height = 'auto';
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  addMessage('user', text);
  showTyping();

  // Build messages for API (exclude opening message from history to keep clean)
  const apiMessages = messages
    .filter((m, i) => !(i === 0 && m.role === 'assistant'))
    .map(m => ({ role: m.role, content: m.content }));

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'chat',
        scenario: currentScenario,
        messages: apiMessages
      })
    });

    const data = await res.json();
    hideTyping();

    if (data.reply) {
      addMessage('assistant', data.reply);
    } else {
      addMessage('assistant', `（エラー: ${data.error || '不明なエラー'}）`);
    }
  } catch (e) {
    hideTyping();
    addMessage('assistant', '（通信エラーが発生しました）');
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('userInput').focus();
}

async function endSession() {
  if (messages.length < 2) {
    alert('もう少し会話してからセッションを終了してください。');
    return;
  }

  const s = SCENARIOS[currentScenario];
  document.getElementById('feedbackScenarioLabel').textContent = `シナリオ: ${s.name} | ${turnCount} ターン`;
  document.getElementById('feedbackLoading').style.display = 'block';
  document.getElementById('feedbackContent').style.display = 'none';

  showScreen('feedback');

  // Filter to only user/assistant turns (exclude system opening)
  const apiMessages = messages
    .filter((m, i) => !(i === 0 && m.role === 'assistant'))
    .map(m => ({ role: m.role, content: m.content }));

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'feedback',
        scenario: currentScenario,
        messages: apiMessages
      })
    });

    const data = await res.json();
    document.getElementById('feedbackLoading').style.display = 'none';
    const contentEl = document.getElementById('feedbackContent');
    contentEl.style.display = 'block';
    contentEl.innerHTML = formatFeedback(data.feedback || 'フィードバックを取得できませんでした。');
  } catch (e) {
    document.getElementById('feedbackLoading').style.display = 'none';
    const contentEl = document.getElementById('feedbackContent');
    contentEl.style.display = 'block';
    contentEl.textContent = '通信エラーが発生しました。';
  }
}

function formatFeedback(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^#{1,3}\s+(.+)$/gm, '<h3>$1</h3>')
    .replace(/^[-•]\s+(.+)$/gm, '• $1')
    .replace(/\n/g, '<br>');
}

function replayScenario() {
  startSession();
}

function handleKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function escapeHtml(text) {
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
}

// Init
buildScenarioGrid();
</script>
